name: Check Alex Notes

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_test_alert:
        description: "Send a Discord test alert"
        required: false
        default: "false"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  check-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout alarm repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_TEST_ALERT: ${{ github.event.inputs.force_test_alert || 'false' }}
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: node src/index.js

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update git-alarm state"
          git push
